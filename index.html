<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rajat's Watchlist</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">

<style>
:root{
  --bg-deep:#07080f;
  --bg-mid:#0d0f1c;
  --glass:rgba(255,255,255,0.045);
  --border:rgba(255,255,255,0.09);
  --border-bright:rgba(255,255,255,0.18);
  --text:#e8eaf0;
  --muted:#6b7280;
  --accent:#7c6af7;
  --gold:#fbbf24;
  --green:#34d399;
  --blue:#60a5fa;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg-deep);
  color:var(--text);
}

/* ================= FIXED AREA ================= */

/* form above cards */
.form-card{
  position:relative;
  z-index:50;
}

/* autocomplete above everything */
.autocomplete{
  position:absolute;
  top:calc(100% + 6px);
  left:20px;
  width:calc(50% - 20px);
  background:#0f1120;
  border:1px solid var(--border-bright);
  border-radius:14px;
  overflow:hidden;
  z-index:99999;
  display:none;
}

/* fix click blocking */
.play-btn{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:4;
  opacity:0;
  transition:.25s;
  pointer-events:none;
}

.play-circle{
  pointer-events:auto;
}

/* ensure buttons clickable */
.card-footer{
  position:relative;
  z-index:5;
}

/* ================= UI ================= */

.wrap{width:min(1400px,94%);margin:auto}

header{
  display:flex;
  justify-content:space-between;
  padding:30px 0;
}

.logo-title{
  font-size:28px;
  font-weight:600;
}

.form-card{
  margin:20px 0;
  display:grid;
  grid-template-columns:2fr 1fr 1fr auto;
  gap:10px;
}

input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#111;
  color:white;
}

.btn{
  background:var(--accent);
  border:none;
  padding:10px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.section{
  margin:25px 0;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

.card{
  position:relative;
  height:240px;
  border-radius:14px;
  overflow:hidden;
}

.poster{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-content{
  position:absolute;
  bottom:0;
  padding:10px;
  width:100%;
  background:linear-gradient(to top, black, transparent);
}

.card-footer{
  display:flex;
  gap:5px;
  margin-top:6px;
}

.action-btn{
  flex:1;
  font-size:11px;
  padding:4px;
  border-radius:6px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<header>
  <div class="logo-title">Rajat's Watchlist</div>
</header>

<div class="form-card">
  <input id="title" placeholder="Search..." autocomplete="off"/>
  <select id="type">
    <option value="">Auto</option>
    <option>Movie</option>
    <option>Series</option>
  </select>
  <select id="status">
    <option>To Watch</option>
    <option>Watching</option>
    <option>Watched</option>
  </select>
  <button class="btn" onclick="addItem()">Add</button>

  <div id="autocomplete" class="autocomplete"></div>
</div>

<div class="section">
  <h3>To Watch</h3>
  <div id="to-watch" class="cards"></div>
</div>

<div class="section">
  <h3>Watching</h3>
  <div id="watching" class="cards"></div>
</div>

<div class="section">
  <h3>Watched</h3>
  <div id="watched" class="cards"></div>
</div>

</div>

<script>
let items = [];

function addItem(){
  const title = document.getElementById('title').value;
  const status = document.getElementById('status').value;

  if(!title) return;

  items.push({
    id:Date.now(),
    title,
    status
  });

  render();
}

function nextStatus(id){
  const item = items.find(i=>i.id===id);
  if(item.status==="To Watch") item.status="Watching";
  else if(item.status==="Watching") item.status="Watched";

  render();
}

function deleteItem(id){
  items = items.filter(i=>i.id!==id);
  render();
}

function createCard(item){
  const div = document.createElement('div');
  div.className='card';

  div.innerHTML=`
    <img class="poster" src="https://placehold.co/300x450"/>
    <div class="play-btn">
      <div class="play-circle">▶</div>
    </div>
    <div class="card-content">
      <div>${item.title}</div>
      <div class="card-footer">
        ${
          item.status!=="Watched"
          ? `<button class="action-btn" onclick="nextStatus(${item.id})">Next</button>`
          : ''
        }
        <button class="action-btn" onclick="deleteItem(${item.id})">Delete</button>
      </div>
    </div>
  `;
  return div;
}

function render(){
  const map = {
    "To Watch": document.getElementById('to-watch'),
    "Watching": document.getElementById('watching'),
    "Watched": document.getElementById('watched')
  };

  Object.values(map).forEach(el=>el.innerHTML="");

  items.forEach(i=>{
    map[i.status].appendChild(createCard(i));
  });
}
</script>

</body>
</html>
